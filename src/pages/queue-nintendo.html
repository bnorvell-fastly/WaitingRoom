<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome to the Nintendo Lobby</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #e60012, #ffccd5);
      font-family: 'Press Start 2P', cursive;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .logo {
      margin-bottom: 20px;
    }

    .logo img {
      width: 300px;
      max-width: 80%;
    }

    .waiting-message {
      font-size: 1rem;
      margin: 20px 0;
    }

    .loader {
      border: 10px solid #f3f3f3;
      border-top: 10px solid white;
      border-radius: 50%;
      width: 80px;
      height: 80px;
      animation: spin 2s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .characters img {
      width: 150px;
      max-width: 40%;
      margin: 10px;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.6rem;
      color: #ffdddd;
    }
  </style>
</head>
<body>

  <div class="logo">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b3/Nintendo_red_logo.svg" alt="Nintendo Logo" />
  </div>

  <div class="waiting-message">
    Please wait while we prepare your adventure...
  </div>
  <div class="waiting-message">
    <p>There are <em>{{ visitorsAhead }}</em> visitors ahead of you.</p>
    <p>Estimated time in queue is {{ estimatedTime }}</p>
  </div>

  <div class="loader"></div>

  <div class="characters">
    <img src="https://upload.wikimedia.org/wikipedia/en/a/a9/MarioNSMBUDeluxe.png" alt="Mario" />
    <img src="https://upload.wikimedia.org/wikipedia/en/9/99/Yoshi.png" alt="Yoshi" />
  </div>

  <div class="footer">
    Not affiliated with or endorsed by Nintendo. Fan-made waiting room page for demonstration purposes only.
  </div>

</body>
</html>
